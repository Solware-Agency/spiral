    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      window.__loadGtag = function () {
        if (window.__gtagLoaded) return;
        window.__gtagLoaded = true;
        var script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-E9DPRXSGM1';
        document.head.appendChild(script);
        gtag('js', new Date());
        gtag('config', 'G-E9DPRXSGM1');
      };

      var queueGtagLoad = function () {
        var load = window.__loadGtag;
        if (typeof load !== 'function') return;
        if ('requestIdleCallback' in window) {
          requestIdleCallback(load, { timeout: 2500 });
          return;
        }
        setTimeout(load, 1400);
      };

      var bindUserInteractionGtag = function () {
        var events = ['pointerdown', 'keydown', 'scroll', 'touchstart'];
        var onFirstInteraction = function () {
          events.forEach(function (evt) {
            window.removeEventListener(evt, onFirstInteraction, { passive: true });
          });
          queueGtagLoad();
        };
        events.forEach(function (evt) {
          window.addEventListener(evt, onFirstInteraction, { passive: true, once: true });
        });
      };

      if (document.readyState === 'complete') {
        bindUserInteractionGtag();
      } else {
        window.addEventListener('load', bindUserInteractionGtag, { once: true });
      }

      // Fallback para sesiones sin interacción (no afectar medición productiva).
      setTimeout(queueGtagLoad, 15000);
    </script>

    <!-- Home: carrusel What We Do (~13 KB × 7); prioridad baja para no competir con el hero LCP -->
    <script>
      (function () {
        var path = location.pathname.replace(/\/+$/, '') || '/';
        if (path !== '/') return;
        var ids = [
          'DSC02040',
          'DSC01963',
          'DSC02380',
          'DSC02285',
          'DSC01989',
          'DSC02408',
          'DSC02284',
        ];
        ids.forEach(function (id) {
          var mobile = document.createElement('link');
          mobile.rel = 'preload';
          mobile.as = 'image';
          mobile.href = '/images/optimized/' + id + '_320.webp';
          mobile.type = 'image/webp';
          mobile.media = '(max-width: 600px)';
          mobile.setAttribute('fetchpriority', 'low');
          document.head.appendChild(mobile);
          var desktop = document.createElement('link');
          desktop.rel = 'preload';
          desktop.as = 'image';
          desktop.href = '/images/optimized/' + id + '_480.webp';
          desktop.type = 'image/webp';
          desktop.media = '(min-width: 601px)';
          desktop.setAttribute('fetchpriority', 'low');
          document.head.appendChild(desktop);
        });
      })();
    </script>
    <script>
      (function () {
        var path = location.pathname.replace(/\/+$/, '').toLowerCase() || '/';
        var id = 'DSC01989';
        if (path === '/portfolio') id = 'DSC01973';
        else if (path === '/services') id = 'DSC09102';
        if (id === 'DSC01989') return;
        document.querySelectorAll('link[data-lcp-hero="default"]').forEach(function (el) {
          el.remove();
        });
        var pairs = [
          [960, '(max-width: 899px)'],
          [1280, '(min-width: 900px) and (max-width: 1199px)'],
          [1600, '(min-width: 1200px) and (max-width: 1599px)'],
          [2560, '(min-width: 1600px) and (max-width: 2199px)'],
          [3200, '(min-width: 2200px)'],
        ];
        pairs.forEach(function (pair) {
          var link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = '/images/optimized/' + id + '_' + pair[0] + '.webp';
          link.type = 'image/webp';
          link.setAttribute('fetchpriority', 'high');
          link.media = pair[1];
          link.setAttribute('data-lcp-hero', 'runtime');
          document.head.appendChild(link);
        });
      })();
    </script>
